<!doctype html>
<html lang="en" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/buy.css" />
    <title>شـراء الـكـتـاب</title>
  </head>
  <body>
    <header>
      <h1>فـقـط كـم جـنـيـهـاً لـتـغـيـيـر حـيـاتـك</h1>
    </header>
    <main>
      <form class="form">
        <input id="name" type="text" placeholder="اسمك" required />
        <input
          id="email"
          type="email"
          required
          placeholder="البريد الإلكتروني"
        />

        <button type="submit">إرسـال</button>
        <button type="reset">إعـادة</button>

        <p id="message"></p>
      </form>
    </main>
    <footer>
      <div class="faq">
        <h2>سـؤال وجـواب (FAQ)</h2>

        <p>
          كـيـف سـأحـصـل عـلـى الـكـتـاب؟
          <br />
          فـور الـدفـع..سـيـصـلـك رابـط تـحـمـيـل نـسـخـتـك عـلـى الـبـريـد
          الألـكـترونـي.
        </p>
      </div>
    </footer>

    <script src="../js/buy.js"></script>
  </body>
</html>
